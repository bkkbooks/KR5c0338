front:
  text: 太丹篇松四元陽子曰金虎者還丹之根本金虎非二物之名蓋述於鉛汞也鉛黑屬比方水數一是子能知一萬事畢契云鉛含五色屬五方又云三黃一黑求死不得三黃一黑靈丹之名能修三一飛仙必得一水也三木鉛砂之汞為青也又曰金丹得就後須出火毒如不出火毒服令人口鼻中生瘡時常衝口乾頰似火燒須出之先取楮汁丸如麻子大次用棗穰丸了以生絹袋子貯掘地坑子可深一尺五寸更疊好紙裹襯却濕土培擁一七日開取懸入井去水三五尺三日呼入寒泉去毒取之於合中於至夜晴露七夜呼天河出毒如丹發動以甘草煎濃去滓令日夜漸漸呷之即解火毒也太一隂君曰金液華丹生羽衣千變萬化無所疑此上仙之要道又龍虎上經曰丹砂木精得金乃並若求長生汞須死汞若不死徒自苦丹木之子金刻之水為母土堰之飛仙之道不待時還丹之功畢在兹若識大道之理候鍾律二氣黃白必就黃牛山金碧歌曰水火獨相配徘徊生景雲七反砂也汞者隂之正氣而能生長萬物故陽躁而隂靜靜則不死之道也經曰天玄地黃得而服之不死之方經曰白虎含赤龍一飛還一伏一物貫五彩汞作仙人祿金石之門而多隱祕緣世人無智不明此道故不顯鉛汞大丹之妙所以庸昧者多貪毒者衆就功者少不可輕泄天道隱文好道君子求賢真士更加思焉丹砂之母汞是月之精而生於陽應天而為臣助人身而能不死丹砂屬南方火火木之子水之孫土之母也故土石是丹砂魂魄陽樂有七金二石五黃白雄雌砒黃曽青隂藥七金三石四水金銀鉛錫硝石朴硝之類龍虎三伏兼通幽微火候黃芽歌曰黑龍變兮赤龍生黃神膠裏水泓澄仙人名為立制石百鍊始得歸蛇形隂功光晶耀鮮色擊觸幽幽作磬聲金光鼎內觀乾象水土相拘混甲庚龍藏虎制不敢伏二氣悠悠在丙丁三陽甲子體乃成千淘萬錬流黃輕
