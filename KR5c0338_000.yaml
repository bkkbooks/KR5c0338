body:
  text: 劉真人歌三山鼎上九重開女子披顔表裏看玄武若能擒白虎三宵五夜自凝還神水煮歸還本色也又歌曰能用水火子母對坐六十卦就黃金滿馱古人不要一馱金即要丹服之可也九霄真君大丹歌七首天地玄黃鉛白為匡神室上下不離本鄉悟之者道失之者狂鼎鼎是甚鼎藥藥是物藥為當四象成為復五神作異類不同宗子母相假託黃芽不用鉛不離鉛中作智者審思之安知道可學不得黃芽砂縱是亦須錯金公作筋髓七寶上良媒姹女勾砂入玄黃定魄回何勞詢道者自得往蓬萊日月自相交乾坤合兩爻中宫為覆籍白液重相包金汞為夫婦水火兩相邀若變隂陽性先文後武調但能知固一控鶴入雲霄玄冥之精天所育白石欲治去沙蹙冥精苦鍊紫光生白石投砂又經宿二分水入母為基能汞室中人莫掬丙丁施比月上宿一百五十餘三六三六更除藥更靈黃芽感之為金精若將此物同河車還與河車俱在比仙藥至妙妙難得萬病能除髮却黑忌豬魚鱉食不得唯與覆盆最相尅流珠得火自然飛唯有黃芽能制之金入猛火色不變自然之道常有期朱兒皇皇多朴質志在鉛花同一室隂陽之道要在一子諦思之莫使失先入水兮復入火玄黃之液化為丹身生羽翼為九仙五色光曜化千般當此之時當自歡黃龍黑鉛三十斤得火不飛石最神北方白石極求勻可以化之無垢塵河上姹女必須真見火不走如君臣未能大器為小人九十一日吠黃銀雄黃伏火黑水自然為金矣荆南李真君大丹金液訣李君諱託是劔南司馬真君弟子張君名陶性好玄文自小慕道石世四百餘年後升化去真君曰良無頭釜有底兩物相逢自合體良無頭是艮也象山即山就也山就之物也釜有底金也金未離母是真鉛也鉛含五彩屬北方水中金金是陽防也久鍊鉛自金也兩物相逢自合體就銀字此銀是北方水銀之銀非西方金銀之也西方銀是鍊出之銀是白虎位亦名市上爛銀潛通訣中不許用銀也唯堪作器物不堪任用取山中天生銀就之生用之乃大丹之田也故潛通訣云昔者古人不𤇨於銀取礦中者生用之言其中有真鉛真鉛者銀是也又云真鉛是紅銀朱結就可為丹頭用之化陰為陽不鍊於汞將朱鉛二物入鼎牛糞火銷鍊之自就於內作還丹也參同契云赤黑達表裏是第一法也意云但取山洞中生銀用為火藥種是正真之法天生牙是也歌曰莫破我車廢我還家若𤇨却鉛名壞車壞却車體不住藥也又失北方坎男義不成但取銀用之即是真一水數也亦是月之精地之魂矣亦名銜鉛銀之銀銀之屬水也自然礪石之粗者日礪即朱砂是也亦是天生自然之物為七十二石之長長生藥之君主亦名之日精變化生成也南方屬火火數二中含一陰為女取辰錦州朱砂為上等生用之日月天地寶神仙羽化根本志人依憑必不悟道也歌曰莫壞我命得全又歌曰日月自相催朱鉛合鉛𤇨日月即坎離也藥之正體陰陽相催自合朱是木之子汞水在其內轉向東南方為龍也震卦是也不用藥直下制水火是藥不安别藥故云不用藥直下制制者是隂制陽陰在上陽在下奔水火是坎離日月之精靈魂自相求者水火之候也水火作媒相配𨽻陰用水為媒陽用火為媒即汞成陽流珠備須謹防若運於火周流六虛用六卦三日震動震卦三五成德乾體乃成三陽足美十六轉成巽卦一隂生也二十三下弦二隂生成艮卦三十日終坤三隂生成歸土還丹始終二體合東北喪朋西南得朋配合陰陽始終矣修到紫宫人出世紫宫南方九宫也汞從南方來至北方紫色西方水銀修鍊運火却歸西方本位經紫色謂之還丹服之沖天故云人出世也潛通訣云金粉雄朱汞水入銀壺中數轉是也不識火鉛與水縱解萬般無所濟火濟者火銜水銀者水隱其實人不識鉛汞水火丹雖多皆不為身之實金尅木生火火尅金生水水生金大丹修鍊相生相尅運用五行金石靈臺訣云此乃天地自然為道且陰陽坎離日月剛柔晝夜情性魂魄對持而相制伏然以權衡法度剛柔相代隂陽相生變化無窮乃合於天上為日月星下為水火金故聖人應天符達變通之道理以萬物生焉如懇於道深誠好術者可以觀此金石之性學淺管見心垢之徒不可求之彭真君歌曰水流潤下火性炎上水火夫婦有衰有王若似參商一俯一仰不立隄防久覺難養術中經云夫汞者姹女之别名砂者鉛中之至珍為砂汞者此真訣也鉛之有砂汞有人有情性也汞於人非外物也砂汞為鉛非雜類也三一之道修情合性然後可以歸真復卦矣金液之術以金養水而後可以返本還元也若别物為之則情性不可合故參同契云名者以定情字者緣性言金來歸本初乃得稱還丹又曰情主治內立置鄞鄂性主營外恆築城郭是知汞汞者鉛之情性也元氣者人之根本也金主營外故為之性汞主治內故謂之情以金制汞推情合性之義含精養神修性合真之道也又曰龍呼於虎吸其精兩相飲食俱相榮乃謂東方甲乙木曰青龍也西方庚辛金曰白虎也龍為情虎為性情性相依還反之義又歌曰束身斂魂充虎飢虎來噉食生體髓脂脈也則呼吸之義明矣又歌曰太陽流珠常欲去人卒得金花轉而相因化為白液凝而正堅金花先唱有頃之間散解為水馬牙闌干陽乃往順情性自然是知立乾坤運水火應天符合三才然後為之丹砂妙言至遠大道至簡銀為牙母為鉛腳但子知宗枝用之即不錯朱砂為金水汞為銀立可制成成即為真修丹不悟三五一悟者還勿坎裏出一生男女並相依變轉青公為金質更無開鎖及隄防內外自家為神室服者長生兼救貧通靈不過於千日又歌曰白馬牙好丹砂配二八和兩家知上下猛三花萬生定不死君莫誇鬼谷先生九轉金液大還丹歌曰仙人鍊丹不用藥唯有神室是金作世人尋道不知源枉損金銀作城郭為世人不知丹訣青霞子曰莫破貨財莫使家貧若不得真口訣鍊丹不得就金銀就是他乾死死了却能變生藥造化不離水銀中精魄結就金花藥藥換不離造化原還丹須是隂陽作四兩一斤共合體一隂一陽相配𨽻七十二日一周天熟了却從甲乙起服之永歲保長年真仙妙訣斯至已又歌曰我家有五物三種少人知本來為一體分作五鄉離東方甲乙青龍兒西方庚辛金女娉為妃南方丙丁火雙生合二儀北方壬癸水得一自堅持中央戊己土修城種寶基用火火一莫令人知水火不相壅圓敗總由伊一轉兩轉安魂魄三轉四轉定半期五轉六轉神光泰七轉八轉上仙追九轉通靈升天漢造化功深勿二疑裝相公大丹歌大道宙丹竈清心慕煙霞隂陽成造化水火結河車鉛汞須歸戊爈開紫金花華池再修養神水各為家志士得之須保惜定我性命育神室下士聞之多暗笑真人見説安魂魄焚香禮之萬事畢皆感天地作仙質容先生曰若遇玄文祕訣至藥不得輕傳輕傳則殃反七祖各愼之矣大丹篇
