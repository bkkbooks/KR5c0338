body:
  text: 劉眞人歌三山鼎上九重開女子披顔表裏㸔玄武若能擒白虎三宵五夜自凝還神水煑歸還本色也又歌曰能用水火子母對坐六十卦就黄金滿䭾古人不要一馱金即要丹服之可也九霄眞君大丹歌七首天地玄黄鉛白爲匡神室上下不離本鄕悟之者道失之者狂鼎鼎是甚鼎藥藥是物藥爲當四象成爲復五神作異類不同宗子母相假託黄芽不用鉛不離鉛中作智者審思之安知道可學不得黄芽砂縱是亦須錯金公作筋髓七寳上良媒姹女勾砂入玄黄定魄廻何勞詢道者自得往蓬萊日月自相交乾坤合兩爻中宫爲覆籍白液重相包金汞爲夫婦水火兩相邀若變隂陽性先文後武調但能知固一控鶴入雲霄玄冥之精天所育白石欲治去沙蹙冥精苦鍊紫光生白石投砂又經宿二分水入母爲基能汞室中人莫掬丙丁施比月上宿一百五十餘三六三六更除藥更靈黄芽感之爲金精若將此物同河車還與河車俱在比仙藥至妙妙難得萬病能除髮却黒忌猪魚鱉食不得唯與覆盆最相尅流珠得火自然飛唯有黄芽能制之金入猛火色不變自然之道常有期朱兒皇皇多朴質志在鉛花同一室隂陽之道要在一子諦思之莫使失先入水兮復入火玄黄之液化爲丹身生羽翼爲九仙五色光曜化千般當此之時當自歡黄龍黑鉛三十斤得火不飛石最神北方白石極求匀可以化之無垢塵河上姹女必須眞見火不走如君臣未能大器爲小人九十一日吠黄銀雄黄伏火黒水自然爲金矣荆南李眞君大丹金液訣李君諱託是劔南司馬眞君弟子張君名陶性好玄文自小慕道石世四百餘年後昇化去眞君曰良無頭釜有底兩物相逢自合體良無頭是艮也象山即山就也山就之物也釜有底金也金未離母是眞鉛也鉛含五彩屬北方水中金金是陽防也久鍊鉛自金也兩物相逢自合體就銀字此銀是北方水銀之銀非西方金銀之也西方銀是鍊岀之銀是白虎位亦名市上爛銀潜通訣中不許用銀也唯堪作器物不堪任用取山中天生銀就之生用之乃大丹之田也故潜通訣云昔者古人不𤇨於銀取礦中者生用之言其中有眞鉛眞鉛者銀是也又云眞鉛是紅銀朱結就可爲丹頭用之化陰爲陽不鍊於汞將朱鉛二物入鼎牛糞火銷鍊之自就於内作還丹也參同契云赤黑達表裏是第一法也意云但取山洞中生銀用爲火藥種是正眞之法天生牙是也歌曰莫破我車癈我還家若𤇨却鉛名壞車壞却車軆不住藥也又失北方坎男義不成但取銀用之即是眞一水數也亦是月之精地之魂矣亦名銜鉛銀之銀銀之屬水也自然礪石之麤者日礪即朱砂是也亦是天生自然之物爲七十二石之長長生藥之君主亦名之日精變化生成也南方屬火火數二中含一陰爲女取辰錦州朱砂爲上等生用之日月天地寳神仙羽化根本志人依憑必不悟道也歌曰莫壞我命得全又歌曰日月自相催朱鉛合鉛𤇨日月即坎離也藥之正軆陰陽相催自合朱是木之子汞水在其内轉向東南方爲龍也震卦是也不用藥直下制水火是藥不安别藥故云不用藥直下制制者是隂制陽陰在上陽在下奔水火是坎離日月之精靈魂自相求者水火之候也水火作媒相配𨽻陰用水爲媒陽用火爲媒即汞成陽流珠備須謹防若運於火周流六虛用六卦三日震動震卦三五成德乾軆乃成三陽足美十六轉成巽卦一隂生也二十三下弦二隂生成艮卦三十日終坤三隂生成歸土還丹始終二體合東北䘮朋西南得朋配合陰陽始終矣修到紫宫人出世紫宫南方九宫也汞從南方來至北方紫色西方水銀修鍊運火却歸西方本位經紫色謂之還丹服之沖天故云人岀世也潜通訣云金粉雄朱汞水入銀壺中數轉是也不識火鉛與水縱解萬般无所濟火濟者火銜水銀者水隱其實人不識鉛汞水火丹雖多皆不爲身之實金尅木生火火尅金生水水生金大丹修鍊相生相尅運用五行金石靈臺訣云此乃天地自然爲道且陰陽坎離日月剛柔晝夜情性魂魄對持而相制伏然以權衡法度剛柔相代隂陽相生變化无窮乃合於天上爲日月星下爲水火金故聖人應天符達變通之道理以萬物生焉如懇於道深誠好術者可以觀此金石之性學淺管見心垢之徒不可求之彭眞君歌曰水流潤下火性炎上水火夫婦有衰有王若似參商一俯一仰不立隄防久覺難養術中經云夫汞者姹女之别名砂者鉛中之至珍爲砂汞者此眞訣也鉛之有砂汞有人有情性也汞於人非外物也砂汞爲鉛非雜類也三一之道修情合性然後可以歸眞復卦矣金液之術以金養水而後可以返本還元也若别物爲之則情性不可合故參同契云名者以定情字者縁性言金來歸本初乃得稱還丹又曰情主治内立置鄞鄂性主營外恒築城郭是知汞汞者鉛之情性也元氣者人之根本也金主營外故爲之性汞主治內故謂之情以金制汞推情合性之義含精養神修性合眞之道也又曰龍呼於虎吸其精兩相飲食俱相榮乃謂東方甲乙木曰青龍也西方庚辛金曰白虎也龍爲情虎爲性情性相依還反之義又歌曰束身歛魂充虎饑虎來噉食生體髓脂脉也則呼吸之義明矣又歌曰太陽流珠常欲去人卒得金花轉而相因化爲白液凝而正堅金花先唱有頃之間散解爲水馬牙䦨干陽乃往順情性自然是知立乾坤運水火應天符合三才然後爲之丹砂妙言至遠大道至簡銀爲牙母爲鉛脚但子知宗枝用之即不錯朱砂爲金水汞爲銀立可制成成即爲眞修丹不悟三五一悟者還勿坎裏出一生男女並相依變轉青公爲金質更無開鎻及隄防內外自家爲神室服者長生兼救貧通靈不過於千日又歌曰白馬牙好丹砂配二八和兩家知上下猛三花萬生定不死君莫誇鬼谷先生九轉金液大還丹歌曰仙人鍊丹不用藥唯有神室是金作世人尋道不知源枉損金銀作城郭爲世人不知丹訣青霞子曰莫破貨財莫使家貧若不得眞口訣鍊丹不得就金銀就是他乾死死了却能變生藥造化不離水銀中精魄結就金花藥藥換不離造化原還丹須是隂陽作四兩一斤共合體一隂一陽相配𨽻七十二日一周天熟了却從甲乙起服之永歳保長年眞仙妙訣斯至已又歌曰我家有五物三種少人知本來爲一軆分作五鄕離東方甲乙青龍兒西方庚辛金女娉爲妃南方丙丁火雙生合二儀北方壬癸水得一自堅持中央戊己土修城種寳基用火火一莫令人知水火不相壅圓敗總由伊一轉兩轉安魂魄三轉四轉定半期五轉六轉神光泰七轉八轉上仙追九轉通靈昇天漢造化功深勿二疑裝相公大丹歌大道宙丹竈清心慕煙霞隂陽成造化水火結河車鉛汞須歸戊爈開紫金花華池再修養神水各爲家志士得之須保惜定我性命育神室下士聞之多暗笑眞人見說安魂魄焚香禮之萬事畢皆感天地作仙質容先生曰若遇玄文祕訣至藥不得輕傳輕傳則殃反七祖各愼之矣大丹篇
